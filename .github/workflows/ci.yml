name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff
          pip install -e ".[dev]" --no-deps
          pip install spacy pydub
          python -m spacy download en_core_web_sm

      - name: Lint with ruff
        run: ruff check src/subforge tests

      - name: Run tests (no network/GPU required)
        run: |
          pytest tests/test_subtitle.py tests/test_audio_preprocess.py tests/test_text_semantically.py -v

      - name: Type check with mypy (optional)
        run: |
          pip install mypy
          mypy src/subforge --ignore-missing-imports
        continue-on-error: true
